name: tests

# Runs the read-only safety unit tests on every push to main and every PR.
# These guard the security-critical invariant: the command classifier rejects
# anything that could mutate config, and --dry-run makes zero subprocess calls.

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the test job only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unittest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor (README declares 3.10+) and current.
        python-version: ["3.10", "3.13"]
    steps:
      # Actions pinned to commit SHAs (supply-chain hardening); version in comment.
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run read-only safety unit tests
        run: python -m unittest test_readonly_safety -v
